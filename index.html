<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
    <script src="main.js" defer></script>
    <title>Genio Gemini Nano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">✦</span>
                <span class="logo-text">Genio Nano</span>
            </div>
            <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
                <span class="theme-icon">☀</span>
            </button>
        </div>

        <button class="new-chat-btn" id="newChatBtn">
            <span>＋</span> Nueva conversación
        </button>

        <div class="history-label">Hoy</div>
        <ul class="history-list" id="historyList">
            <!-- items añadidos por JS -->
        </ul>

        <div class="sidebar-footer">
            <div class="model-badge">
                <span class="model-dot"></span>
                Gemini Nano · Local
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="main">

        <!-- Top bar -->
        <header class="topbar">
            <button class="sidebar-toggle" id="sidebarToggle">☰</button>
            <span class="topbar-title">Gemini Nano</span>
            <div id="statusDot" class="status-dot loading" title="Inicializando..."></div>
        </header>

        <!-- Chat area -->
        <div class="chat-area" id="chatArea">

            <!-- Estado vacío -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">✦</div>
                <h2 class="empty-title">¿En qué puedo ayudarte?</h2>
                <p class="empty-sub">Haz una pregunta. La IA corre <em>completamente en tu dispositivo</em>, sin enviar datos a ningún servidor.</p>
                <div class="suggestions">
                    <button class="suggestion-chip" data-q="¿Cuál es la capital de España?">¿Capital de España?</button>
                    <button class="suggestion-chip" data-q="Explícame qué es la fotosíntesis en dos frases">Fotosíntesis en 2 frases</button>
                    <button class="suggestion-chip" data-q="Dame 3 consejos para concentrarme mejor">Tips de concentración</button>
                    <button class="suggestion-chip" data-q="¿Qué diferencia hay entre Java y JavaScript?">Java vs JavaScript</button>
                </div>
            </div>

            <!-- Mensajes -->
            <div class="messages" id="messages"></div>

        </div>

        <!-- Input bar -->
        <div class="input-wrapper">
            <div class="input-bar" id="inputBar">
                <textarea
                    id="userInput"
                    placeholder="Escribe tu pregunta..."
                    rows="1"
                    maxlength="2000"
                ></textarea>
                <button id="sendBtn" class="send-btn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"/>
                        <polyline points="5 12 12 5 19 12"/>
                    </svg>
                </button>
            </div>
            <p class="disclaimer">La IA puede cometer errores. Verifica la información importante.</p>
        </div>

    </main>

    <!-- Toast de estado -->
    <div class="toast" id="toast"></div>

</body>
</html>
